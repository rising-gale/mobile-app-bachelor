<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation Email</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            max-width: 600px;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        h1 {
            color: #333333;
        }
        p {
            color: #666666;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #ff5722; /* Изменен цвет кнопки */
            color: #ffffff; /* Изменен цвет текста кнопки */
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #f44336; /* Изменен цвет при наведении */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вітаємо!</h1>
        <p>Будь ласка, підтвердіть свою адресу електронної пошти, натиснувши на кнопку нижче:</p>
        <a href="{{ confirmation_link }}" class="btn">Підтвердити Email</a>
    </div>
</body>
</html>
